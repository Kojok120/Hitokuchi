name: Hitokuchi
options:
  bundleIdPrefix: app.hitokuchi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  developmentLanguage: ja
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.1"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: "YES"
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      VALIDATE_PRODUCT: "YES"

configs:
  Debug: debug
  Release: release

targets:
  Hitokuchi:
    type: application
    platform: iOS
    sources:
      - path: Hitokuchi
        excludes:
          - "**/*.xcassets/*/Contents.json"
    resources:
      - path: Hitokuchi/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.hitokuchi.Hitokuchi
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Hitokuchi/Info.plist
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "ひとくち"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.healthcare-fitness"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    dependencies:
      - framework: HealthKit.framework
        embed: false
        weak: true
      - framework: StoreKit.framework
        embed: false

  HitokuchiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HitokuchiTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.hitokuchi.HitokuchiTests
        SWIFT_VERSION: "6.1"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Hitokuchi
